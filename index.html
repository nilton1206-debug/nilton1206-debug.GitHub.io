<!DOCTYPE html>
<html>
<head>
  <title>Nosso Espaço ❤️</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      background: black;
      color: white;
      font-family: Arial;
      text-align: center;
      padding: 20px;
    }

    button {
      padding: 12px;
      margin: 8px;
      border: none;
      border-radius: 10px;
      background: #ff4d6d;
      color: white;
      cursor: pointer;
    }

    input {
      padding: 10px;
      margin: 5px;
      border-radius: 8px;
      border: none;
    }

    .hidden {
      display: none;
    }

    .card {
      background: #1a1a1a;
      padding: 15px;
      margin: 10px;
      border-radius: 15px;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h2>Nosso espaço 💛</h2>
  <input type="password" id="senhaInput" placeholder="Digite a senha">
  <br>
  <button onclick="verificarSenha()">Entrar</button>
  <p id="erro" style="color:red;"></p>
</div>

<!-- CONTEÚDO -->
<div id="conteudo" class="hidden">

  <!-- HOME -->
  <div id="home">

    <h1>Nilton ❤️ Isabella</h1>

    <img src="foto.jpg" style="width:200px; border-radius:20px;">

    <p id="contador"></p>

    <button onclick="mostrarMensagem()">💌 Mensagem</button>
    <button onclick="abrirMassagem()">💆‍♀️ Relaxar</button>
    <button onclick="verHistorico()">📜 Histórico</button>

    <div id="mensagemBox"></div>
    <div id="historico"></div>

    <!-- CALENDÁRIO -->
    <div class="card">
      <h3>📅 Compromissos</h3>
      <input type="date" id="data">
      <input type="text" id="evento" placeholder="O que vamos fazer?">
      <br>
      <button onclick="salvarEvento()">Salvar</button>
      <div id="listaEventos"></div>
    </div>

    <!-- METAS -->
    <div class="card">
      <h3>🎯 Metas</h3>
      <input type="text" id="meta" placeholder="Ex: viajar juntos">
      <button onclick="addMeta()">Adicionar</button>
      <div id="metas"></div>
    </div>

  </div>

  <!-- MASSAGEM -->
  <div id="massagem" class="hidden">

    <div style="display:flex; flex-wrap:wrap; justify-content:center; gap:20px;">

      <div>
        <h2>Escolha sua massagem 😏</h2>

        <button onclick="escolha('Ombro')">Ombro</button>
        <button onclick="escolha('Completa')">Completa</button>
        <button onclick="escolha('Relaxante')">Relaxante</button>
        <button onclick="escolha('Surpresa')">Surpresa 😈</button>

        <br>
        <button onclick="voltar()">⬅️ Voltar</button>
      </div>

      <div>
        <img src="https://images.unsplash.com/photo-1544161515-4ab6ce6db874"
             style="width:300px; border-radius:15px;">
      </div>

    </div>

  </div>

</div>

<script>

// LOGIN
function verificarSenha() {
  let senha = document.getElementById("senhaInput").value;

  if (senha === "1206") {
    document.getElementById("login").style.display = "none";
    document.getElementById("conteudo").classList.remove("hidden");
  } else {
    document.getElementById("erro").innerText = "Senha incorreta 😢";
  }
}

// CONTADOR
const inicio = new Date("2024-05-09");
const hoje = new Date();
const dias = Math.floor((hoje - inicio) / (1000 * 60 * 60 * 24));
document.getElementById("contador").innerText =
"Estamos juntos há " + dias + " dias ❤️";

// MENSAGEM BONITA
function mostrarMensagem() {
  document.getElementById("mensagemBox").innerHTML =
  "<div class='card'>Você é a melhor parte dos meus dias ❤️</div>";
}

// NAVEGAÇÃO
function abrirMassagem() {
  document.getElementById("home").classList.add("hidden");
  document.getElementById("massagem").classList.remove("hidden");
}

function voltar() {
  document.getElementById("massagem").classList.add("hidden");
  document.getElementById("home").classList.remove("hidden");
}

// MASSAGEM + WHATSAPP + HISTÓRICO
function escolha(tipo) {
  let historico = JSON.parse(localStorage.getItem("massagens")) || [];

  historico.push(tipo + " - " + new Date().toLocaleString());

  localStorage.setItem("massagens", JSON.stringify(historico));

  let numero = "5511963527566"; // COLOCA SEU NÚMERO

  let mensagem = "Oi amor da minha vida 💛 quero uma massagem: " + tipo;

  let url = "https://wa.me/" + numero + "?text=" + encodeURIComponent(mensagem);

  window.open(url, "_blank");
}

// HISTÓRICO
function verHistorico() {
  let historico = JSON.parse(localStorage.getItem("massagens")) || [];

  let html = "<div class='card'><h3>Histórico 💆‍♀️</h3>";

  historico.forEach(item => {
    html += "<p>" + item + "</p>";
  });

  html += "</div>";

  document.getElementById("historico").innerHTML = html;
}

// CALENDÁRIO
function salvarEvento() {
  let data = document.getElementById("data").value;
  let evento = document.getElementById("evento").value;

  let eventos = JSON.parse(localStorage.getItem("eventos")) || [];

  eventos.push(data + " - " + evento);

  localStorage.setItem("eventos", JSON.stringify(eventos));

  mostrarEventos();
}

function mostrarEventos() {
  let eventos = JSON.parse(localStorage.getItem("eventos")) || [];

  let html = "";

  eventos.forEach(e => {
    html += "<p>" + e + "</p>";
  });

  document.getElementById("listaEventos").innerHTML = html;
}

// METAS
function addMeta() {
  let meta = document.getElementById("meta").value;

  let metas = JSON.parse(localStorage.getItem("metas")) || [];

  metas.push(meta);

  localStorage.setItem("metas", JSON.stringify(metas));

  mostrarMetas();
}

function mostrarMetas() {
  let metas = JSON.parse(localStorage.getItem("metas")) || [];

  let html = "";

  metas.forEach(m => {
    html += "<p>✔️ " + m + "</p>";
  });

  document.getElementById("metas").innerHTML = html;
}

// INICIALIZA
mostrarEventos();
mostrarMetas();

</script>

</body>
</html>
