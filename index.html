<!DOCTYPE html>
<html>
<head>
  <title>Nosso Espaço ❤️</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="background:black; color:white; text-align:center; font-family:Arial; padding:30px;">

<script>
let senha = prompt("Digite a senha 💛");

if (senha !== "1234") {
  document.body.innerHTML = "<h1>Acesso negado 😢</h1>";
} else {
  document.body.innerHTML = `
    <h1>Nilton ❤️ Amor</h1>

    <p id="contador"></p>

    <button onclick="mensagem()" style="padding:15px; margin:10px;">
    💌 Mensagem
    </button>

    <br>

    <button onclick="massagem()" style="padding:15px; margin:10px;">
    💆‍♀️ Quero massagem
    </button>
  `;

  const inicio = new Date("2023-01-01");
  const hoje = new Date();
  const dias = Math.floor((hoje - inicio) / (1000 * 60 * 60 * 24));

  document.getElementById("contador").innerText =
  "Estamos juntos há " + dias + " dias ❤️";

  function mensagem() {
    alert("Você é a melhor parte dos meus dias ❤️");
  }

  function massagem() {
    let tipo = prompt("Escolha 😏\n1- Ombro\n2- Completa\n3- Relaxante\n4- Surpresa");

    if (tipo == "1") {
      alert("Massagem nos ombros agendada 😌");
    } else if (tipo == "2") {
      alert("Massagem completa 😏 Prepare-se...");
    } else if (tipo == "3") {
      alert("Modo relax ativado 💆‍♀️");
    } else if (tipo == "4") {
      alert("Surpresa aceita 😈");
    } else {
      alert("Escolhe direito depois 😅");
    }
  }
}
</script>

</body>
</html>
