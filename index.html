<!DOCTYPE html>
<html>
<head>
  <title>Nosso Espaço ❤️</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      background: black;
      color: white;
      text-align: center;
      font-family: Arial;
      padding: 30px;
    }

    button {
      padding: 15px;
      margin: 10px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      cursor: pointer;
      width: 80%;
      max-width: 300px;
      background: #ff4d6d;
      color: white;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>

<script>
let senha = prompt("Digite a senha 💛");

if (senha !== "1234") {
  document.body.innerHTML = "<h1>Acesso negado 😢</h1>";
}
</script>

<div id="home">

  <h1>Nilton ❤️ Amor</h1>

  <p id="contador"></p>

  <button onclick="mensagem()">💌 Mensagem</button>
  <button onclick="abrirMassagem()">💆‍♀️ Relaxar</button>

</div>

<div id="massagem" class="hidden">

  <h2>Escolha sua massagem 😏</h2>

  <button onclick="escolha('Ombro')">Ombro</button>
  <button onclick="escolha('Completa')">Completa</button>
  <button onclick="escolha('Relaxante')">Relaxante</button>
  <button onclick="escolha('Surpresa')">Surpresa 😈</button>

  <br>
  <button onclick="voltar()">⬅️ Voltar</button>

</div>

<script>
// contador
const inicio = new Date("2023-01-01");
const hoje = new Date();
const dias = Math.floor((hoje - inicio) / (1000 * 60 * 60 * 24));
document.getElementById("contador").innerText =
"Estamos juntos há " + dias + " dias ❤️";

function mensagem() {
  alert("Você é a melhor parte dos meus dias ❤️");
}

function abrirMassagem() {
  document.getElementById("home").classList.add("hidden");
  document.getElementById("massagem").classList.remove("hidden");
}

function voltar() {
  document.getElementById("massagem").classList.add("hidden");
  document.getElementById("home").classList.remove("hidden");
}

function escolha(tipo) {
  alert("Massagem " + tipo + " escolhida 😏");
}
</script>

</body>
</html>
