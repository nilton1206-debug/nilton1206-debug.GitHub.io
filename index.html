<!DOCTYPE html>
<html>
<head>
  <title>Nosso Espaço ❤️</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      background: black;
      color: white;
      text-align: center;
      font-family: Arial;
      padding: 30px;
    }

    button {
      padding: 15px;
      margin: 10px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      cursor: pointer;
      width: 80%;
      max-width: 300px;
      background: #ff4d6d;
      color: white;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>

<script>
let senha = prompt("Digite a senha 💛");

if (senha !== "1206") {
  document.body.innerHTML = "<h1>Acesso negado 😢</h1>";
}
</script>

<div id="home">

  <h1>Nilton ❤️ Isabella</h1>

  <p id="contador"></p>

  <button onclick="mensagem()">💌 Mensagem</button>
  <button onclick="abrirMassagem()">💆‍♀️ Relaxar</button>

</div>

<!-- TELA DE MASSAGEM -->
<div id="massagem" class="hidden">

  <div style="display: flex; flex-direction: row; align-items: center; justify-content: center; gap: 20px; flex-wrap: wrap;">

    <!-- ESQUERDA -->
    <div style="min-width: 250px;">

      <h2>Escolha sua massagem 😏</h2>

      <button onclick="escolha('Ombro')">Ombro</button>
      <button onclick="escolha('Completa')">Completa</button>
      <button onclick="escolha('Relaxante')">Relaxante</button>
      <button onclick="escolha('Surpresa')">Surpresa 😈</button>

      <br>
      <button onclick="voltar()">⬅️ Voltar</button>

    </div>

    <!-- DIREITA -->
    <div>
      <img src="https://images.unsplash.com/photo-1544161515-4ab6ce6db874"
           style="width: 300px; border-radius: 15px;">
    </div>

  </div>

</div>

<script>
// CONTADOR
const inicio = new Date("2023-05-09"); // MUDA PRA DATA DE VOCÊS
const hoje = new Date();
const dias = Math.floor((hoje - inicio) / (1000 * 60 * 60 * 24));

document.getElementById("contador").innerText =
"Estamos juntos há " + dias + " dias ❤️";

// MENSAGEM
function mensagem() {
  alert("Você é a minha pessoa mais importante nesse mundo inteiro!!");
}

// ABRIR TELA MASSAGEM
function abrirMassagem() {
  document.getElementById("home").classList.add("hidden");
  document.getElementById("massagem").classList.remove("hidden");
}

// VOLTAR
function voltar() {
  document.getElementById("massagem").classList.add("hidden");
  document.getElementById("home").classList.remove("hidden");
}

// ENVIAR WHATSAPP
function escolha(tipo) {
  let numero = "5511963527566"; // COLOCA SEU NÚMERO AQUI

  let mensagem = "Oi minha vida, meu amor maior do mundo todo ❤️ quero uma massagem: " + tipo + " 😏";

  let url = "https://wa.me/" + numero + "?text=" + encodeURIComponent(mensagem);

  window.open(url, "_blank");
}
</script>

</body>
</html>
